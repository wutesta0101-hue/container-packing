# ============================================================
# Nginx 設定 — Container Packing 前端容器
#
# 兩個責任：
#   1. 提供靜態檔（React build 產物）
#   2. 把 /api 開頭的請求反向代理到 backend 容器（port 9000）
#
# 為什麼要反向代理？
#   - 前端與後端是兩個容器，分屬不同 IP
#   - 但對瀏覽器來說，看到的是「同一個網站」
#   - 所以前端 axios 呼叫 /api/v1/pack 時，Nginx 會轉發到後端
#   - 完全沒有 CORS 問題（同源請求）
# ============================================================

server {
    listen 80;
    server_name _;

    # ====== 1. 靜態檔位置 ======
    root /usr/share/nginx/html;
    index index.html;

    # ====== 2. SPA 路由處理 ======
    # React Router 的路徑（例如 /history, /settings）伺服器上沒有對應檔案
    # try_files 會依序找：
    #   1. 真實檔案（.js .css .png 等）
    #   2. 真實資料夾
    #   3. fallback 到 index.html（讓 React Router 處理）
    #
    # 這個專案目前沒用 React Router，但加上對未來擴充比較友善
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ====== 3. /api 反向代理到後端 ======
    # 凡是 /api 開頭的請求，都轉發到 backend 容器
    # "backend" 是 docker-compose.yml 定義的服務名稱
    # Docker 內建 DNS 會自動解析成那個容器的 IP
    location /api/ {
        proxy_pass http://backend:9000/api/;

        # 把原始請求的 Host、Real-IP 等資訊傳給後端
        # 後端可以記錄真實的 client IP（不是 Nginx 的 IP）
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 預設 timeout 60 秒可能不夠（演算法慢的話）
        # 拉長到 300 秒（5 分鐘）保險
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # ====== 4. 靜態資源加上 cache ======
    # .js .css 帶 hash 檔名，可以強 cache 1 年
    # Vite build 出來的檔案都帶 hash（例如 main-abc123.js）
    location ~* \.(js|css|woff2?|png|jpg|jpeg|gif|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html 不能 cache，否則改版後使用者看不到新版
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ====== 5. 隱藏 Nginx 版本（資安最佳實務）======
    server_tokens off;

    # ====== 6. gzip 壓縮（縮小傳輸量）======
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;
}
